mpc_params:
  show_debug_info: false
  ctrl_period: 0.02
  enable_path_smoothing: true
  enable_yaw_recalculation: true
  path_filter_moving_ave_num: 1
  path_smoothing_times: 1
  curvature_smoothing_num: 35
  traj_resample_dist: 0.1
  admisible_position_error: 1.5
  admisible_yaw_error_deg: 60.0
  mpc_prediction_horizon: 70
  mpc_prediction_sampling_time: 0.1
  mpc_weight_lat_error: 0.5
  mpc_weight_heading_error: 0.1
  mpc_weight_heading_error_squared_vel_coeff: 5.0
  mpc_weight_steering_input: 1.0
  mpc_weight_steering_input_squared_vel_coeff: 0.25
  mpc_weight_lat_jerk: 0.0
  mpc_weight_terminal_lat_error: 1.0
  mpc_weight_terminal_heading_error: 0.1
  mpc_zero_ff_steer_deg: 5.0
  delay_compensation_time: 0.0
  vehicle_model_wheelbase: 0.582
  vehicle_model_type: "kinematics_no_delay"
  mass_fl: 600.0
  mass_fr: 600.0
  mass_rl: 600.0	
  mass_rr: 600.0
  cf: 155494.663
  cr: 155494.663
  qp_solver_type: "unconstraint_fast"
  steering_lpf_cutoff_hz: 50
  error_deriv_lpf_curoff_hz: 50
pid__parameters:
  delay_compensation_time: 0.17

  enable_smooth_stop: true
  enable_overshoot_emergency: true
  enable_large_tracking_error_emergency: true
  enable_slope_compensation: false
  enable_keep_stopped_until_steer_convergence: true

  # state transition
  drive_state_stop_dist: 0.5
  drive_state_offset_stop_dist: 1.0
  stopping_state_stop_dist: 2.0
  stopped_state_entry_duration_time: 0.1
  stopped_state_entry_vel: 0.1
  stopped_state_entry_acc: 0.1
  emergency_state_overshoot_stop_dist: 1.0
  emergency_state_traj_trans_dev: 3.0
  emergency_state_traj_rot_dev: 0.7

  # drive state
  kp: 1.0
  ki: 0.1
  kd: 0.0
  max_out: 1.0
  min_out: -1.0
  max_p_effort: 1.0
  min_p_effort: -1.0
  max_i_effort: 0.3
  min_i_effort: -0.3
  max_d_effort: 0.0
  min_d_effort: 0.0
  lpf_vel_error_gain: 0.9
  current_vel_threshold_pid_integration: 0.5
  enable_brake_keeping_before_stop: false
  brake_keeping_acc: -0.2

  # smooth stop state
  smooth_stop_max_strong_acc: -0.5
  smooth_stop_min_strong_acc: -1.0
  smooth_stop_weak_acc: -0.3
  smooth_stop_weak_stop_acc: -0.8
  smooth_stop_strong_stop_acc: -3.4
  smooth_stop_max_fast_vel: 0.5
  smooth_stop_min_running_vel: 0.01
  smooth_stop_min_running_acc: 0.01
  smooth_stop_weak_stop_time: 0.8
  smooth_stop_weak_stop_dist: -0.3
  smooth_stop_strong_stop_dist: -0.5

  # stopped state
  stopped_vel: 0.0
  stopped_acc: -3.4
  stopped_jerk: -5.0

  # emergency state
  emergency_vel: 0.0
  emergency_acc: -5.0
  emergency_jerk: -3.0

  # acceleration limit
  max_acc: 3.0
  min_acc: -5.0

  # jerk limit
  max_jerk: 2.0
  min_jerk: -5.0

  # pitch
  use_trajectory_for_pitch_calculation: false
  lpf_pitch_gain: 0.95
  max_pitch_rad: 0.1
  min_pitch_rad: -0.1
